
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenFlow Spa Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "recharts": "https://esm.sh/recharts@2.12.0?external=react,react-dom"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <div id="loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#64748b;background:#fff;">
        <div style="width:30px;height:30px;border:3px solid #0d9488;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>
        <p style="margin-top:12px;font-weight:500;font-size:15px;color:#475569;">Loading ZenFlow...</p>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    <script type="module" src="/entry.js"></script>
</body>
</html>
